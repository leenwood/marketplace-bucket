syntax = "proto3";

package cart.v1;

option go_package = "github.com/marketplace/cart-service/pkg/pb";

// CartService manages shopping carts identified by a user ID.
service CartService {
  // AddItem adds an item to the cart, or increments its quantity if it already exists.
  rpc AddItem(AddItemRequest) returns (CartResponse);
  // RemoveItem removes an item from the cart by product ID.
  rpc RemoveItem(RemoveItemRequest) returns (CartResponse);
  // UpdateQuantity sets the quantity of an existing item.
  rpc UpdateQuantity(UpdateQuantityRequest) returns (CartResponse);
  // GetCart returns the current cart contents.
  rpc GetCart(GetCartRequest) returns (CartResponse);
  // ClearCart removes all items from the cart.
  rpc ClearCart(ClearCartRequest) returns (CartResponse);
}

message Item {
  string product_id = 1;
  string name       = 2;
  double price      = 3;
  int32  quantity   = 4;
}

message CartResponse {
  string user_id      = 1;
  repeated Item items = 2;
  double total        = 3;
}

message AddItemRequest {
  string user_id = 1;
  Item   item    = 2;
}

message RemoveItemRequest {
  string user_id    = 1;
  string product_id = 2;
}

message UpdateQuantityRequest {
  string user_id    = 1;
  string product_id = 2;
  int32  quantity   = 3;
}

message GetCartRequest {
  string user_id = 1;
}

message ClearCartRequest {
  string user_id = 1;
}
